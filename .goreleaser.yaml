version: 2

project_name: ore

builds:
  - id: ore
    main: ./cmd/ore
    binary: ore
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: ored
    main: ./cmd/ored
    binary: ored
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: ore
    builds:
      - ore
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "ore_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

  - id: ored
    builds:
      - ored
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "ored_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

dockers:
  - id: ored-amd64
    ids:
      - ored
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.ored
    image_templates:
      - "ghcr.io/oreforge/ore/ored:{{ .Version }}-amd64"
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.title=ored"
      - "--label=org.opencontainers.image.description=OreForge daemon for managing game server networks"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/oreforge/ore"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--platform=linux/amd64"

  - id: ored-arm64
    ids:
      - ored
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.ored
    image_templates:
      - "ghcr.io/oreforge/ore/ored:{{ .Version }}-arm64"
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.title=ored"
      - "--label=org.opencontainers.image.description=OreForge daemon for managing game server networks"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/oreforge/ore"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/oreforge/ore/ored:{{ .Version }}"
    image_templates:
      - "ghcr.io/oreforge/ore/ored:{{ .Version }}-amd64"
      - "ghcr.io/oreforge/ore/ored:{{ .Version }}-arm64"

  - name_template: "ghcr.io/oreforge/ore/ored:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/oreforge/ore/ored:{{ .Version }}-amd64"
      - "ghcr.io/oreforge/ore/ored:{{ .Version }}-arm64"

  - name_template: "ghcr.io/oreforge/ore/ored:latest"
    image_templates:
      - "ghcr.io/oreforge/ore/ored:{{ .Version }}-amd64"
      - "ghcr.io/oreforge/ore/ored:{{ .Version }}-arm64"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: oreforge
    name: ore
  name_template: "v{{ .Version }}"
  prerelease: auto
  make_latest: true

changelog:
  sort: asc
  abbrev: -1
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?(fix|bug)(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Improvements
      regexp: '^.*?(refactor|perf|improve)(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "^Merge"