syntax = "proto3";

package ore.v1;

option go_package = "github.com/oreforge/ore/api/orev1";

service OreService {
  rpc Up(UpRequest) returns (stream UpResponse);
  rpc Down(DownRequest) returns (stream DownResponse);
  rpc Build(BuildRequest) returns (stream BuildResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc Prune(PruneRequest) returns (stream PruneResponse);
  rpc Clean(CleanRequest) returns (stream CleanResponse);
  rpc Console(ConsoleRequest) returns (ConsoleResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
}

message LogEntry {
  int64 time_unix_milli = 1;
  string level = 2;
  string message = 3;
  repeated LogAttr attrs = 4;
}

message LogAttr {
  string key = 1;
  string value = 2;
}

message UpRequest {
  bool no_cache = 1;
}

message UpResponse {
  LogEntry log = 1;
}

message DownRequest {}

message DownResponse {
  LogEntry log = 1;
}

message BuildRequest {
  bool no_cache = 1;
}

message BuildResponse {
  LogEntry log = 1;
}

message StatusRequest {}

message StatusResponse {
  string network = 1;
  repeated ServerStatus servers = 2;
}

message ServerStatus {
  string name = 1;
  repeated ContainerStatus replicas = 2;
}

message ContainerStatus {
  string name = 1;
  string state = 2;
  string health = 3;
  string image = 4;
  repeated PortBinding ports = 5;
  int64 started_at_unix = 6;
  int64 uptime_seconds = 7;
  int32 restart_count = 8;
  int32 exit_code = 9;
  int64 memory_bytes = 10;
  double cpus = 11;
}

message PortBinding {
  int32 host_port = 1;
  int32 container_port = 2;
  string protocol = 3;
}

enum PruneTarget {
  PRUNE_TARGET_UNSPECIFIED = 0;
  PRUNE_TARGET_ALL = 1;
  PRUNE_TARGET_CONTAINERS = 2;
  PRUNE_TARGET_IMAGES = 3;
  PRUNE_TARGET_VOLUMES = 4;
}

message PruneRequest {
  PruneTarget target = 1;
}

message PruneResponse {
  LogEntry log = 1;
}

enum CleanTarget {
  CLEAN_TARGET_UNSPECIFIED = 0;
  CLEAN_TARGET_ALL = 1;
  CLEAN_TARGET_CACHE = 2;
  CLEAN_TARGET_BUILDS = 3;
}

message CleanRequest {
  CleanTarget target = 1;
}

message CleanResponse {
  LogEntry log = 1;
}

message ConsoleRequest {
  string server_name = 1;
  int32 replica = 2;
}

message ConsoleResponse {
  string addr = 1;
  string nonce = 2;
}

message ListProjectsRequest {}

message ListProjectsResponse {
  repeated string projects = 1;
}
